name: Publish Docker images

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - Dockerfile.lite

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-full:
    outputs:
      UPSTREAM_VERSION: ${{ steps.get_version.outputs.UPSTREAM_VERSION }}
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get Stash Version
        id: get_version
        run: |
          VER=$(cat UPSTREAM_VERSION)
          echo "UPSTREAM_VERSION=$VER" >> $GITHUB_OUTPUT
          echo "UPSTREAM_VERSION=$VER" >> $GITHUB_ENV

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ github.repository_owner }}/stash-jellyfin-ffmpeg
            ${{ github.repository_owner }}/stash
            ghcr.io/${{ github.repository_owner }}/stash
          flavor: latest=true
          tags: |
            type=raw,priority=997,${{ env.UPSTREAM_VERSION }}
            type=sha,priority=998,prefix=${{ env.UPSTREAM_VERSION }}-
            type=sha,priority=999,prefix=,suffix=,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: |
            ${{ github.repository_owner }}/stash-jellyfin-ffmpeg
            ${{ github.repository_owner }}/stash
            ghcr.io/${{ github.repository_owner }}/stash
          build-args: |
            STASH_RELEASE=${{ env.UPSTREAM_VERSION }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}-full
          cache-to: type=gha,scope=${{ env.PLATFORM_PAIR }}-full,mode=max
          file: Dockerfile
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests-full
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests-full/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-full-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests-full/*
          if-no-files-found: error
          retention-days: 1

  build-lite:
    outputs:
      UPSTREAM_VERSION: ${{ steps.get_version.outputs.UPSTREAM_VERSION }}
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            qemu: false
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            qemu: false
          - platform: linux/arm/v7
            runner: ubuntu-24.04-arm
            qemu: true
          - platform: linux/arm/v6
            runner: ubuntu-24.04-arm
            qemu: true

    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get Stash Version
        id: get_version
        run: |
          VER=$(cat UPSTREAM_VERSION)
          echo "UPSTREAM_VERSION=$VER" >> $GITHUB_OUTPUT
          echo "UPSTREAM_VERSION=$VER" >> $GITHUB_ENV

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ github.repository_owner }}/stash-jellyfin-ffmpeg
            ${{ github.repository_owner }}/stash
            ghcr.io/${{ github.repository_owner }}/stash
          flavor: latest=false
          tags: |
            type=raw,priority=996,lite-${{ env.UPSTREAM_VERSION }}
            type=sha,priority=997,prefix=lite-${{ env.UPSTREAM_VERSION }}-
            type=sha,priority=998,prefix=lite-,suffix=,format=short
            type=raw,priority=999,lite

      - name: Set up QEMU
        if: matrix.qemu
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: |
            ${{ github.repository_owner }}/stash-jellyfin-ffmpeg
            ${{ github.repository_owner }}/stash
            ghcr.io/${{ github.repository_owner }}/stash
          build-args: |
            STASH_RELEASE=${{ env.UPSTREAM_VERSION }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}-lite
          cache-to: type=gha,scope=${{ env.PLATFORM_PAIR }}-lite,mode=max
          file: Dockerfile.lite
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests-lite
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests-lite/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-lite-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests-lite/*
          if-no-files-found: error
          retention-days: 1

  merge:
    env:
      UPSTREAM_VERSION: ${{ needs.build-full.outputs.UPSTREAM_VERSION }}
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    runs-on: ubuntu-latest
    needs:
      - build-full
      - build-lite
    steps:
      - name: Download full digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests-full
          pattern: digests-full-*
          merge-multiple: true

      - name: Download lite digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests-lite
          pattern: digests-lite-*
          merge-multiple: true

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta (full)
        id: meta_full
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ github.repository_owner }}/stash-jellyfin-ffmpeg
            ${{ github.repository_owner }}/stash
            ghcr.io/${{ github.repository_owner }}/stash
          flavor: latest=true
          tags: |
            type=raw,priority=997,${{ env.UPSTREAM_VERSION }}
            type=sha,priority=998,prefix=${{ env.UPSTREAM_VERSION }}-
            type=sha,priority=999,prefix=,suffix=,format=short

      - name: Docker meta (lite)
        id: meta_lite
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ github.repository_owner }}/stash-jellyfin-ffmpeg
            ${{ github.repository_owner }}/stash
            ghcr.io/${{ github.repository_owner }}/stash
          flavor: latest=false
          tags: |
            type=raw,priority=996,lite-${{ env.UPSTREAM_VERSION }}
            type=sha,priority=997,prefix=lite-${{ env.UPSTREAM_VERSION }}-
            type=sha,priority=998,prefix=lite-,suffix=,format=short
            type=raw,priority=999,lite

      - name: Create and push full manifest
        working-directory: ${{ runner.temp }}/digests-full
        run: |
          TAGS=$(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          REFS=""
          for digest in *; do
            REFS="${REFS} ${{ github.repository_owner }}/stash-jellyfin-ffmpeg@sha256:${digest}"
            REFS="${REFS} ${{ github.repository_owner }}/stash@sha256:${digest}"
            REFS="${REFS} ghcr.io/${{ github.repository_owner }}/stash@sha256:${digest}"
          done
          docker buildx imagetools create ${TAGS} ${REFS}
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta_full.outputs.json }}

      - name: Create and push lite manifest
        working-directory: ${{ runner.temp }}/digests-lite
        run: |
          TAGS=$(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          REFS=""
          for digest in *; do
            REFS="${REFS} ${{ github.repository_owner }}/stash-jellyfin-ffmpeg@sha256:${digest}"
            REFS="${REFS} ${{ github.repository_owner }}/stash@sha256:${digest}"
            REFS="${REFS} ghcr.io/${{ github.repository_owner }}/stash@sha256:${digest}"
          done
          docker buildx imagetools create ${TAGS} ${REFS}
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta_lite.outputs.json }}

      - name: Inspect images
        run: |
          docker buildx imagetools inspect ${{ github.repository_owner }}/stash:${{ env.UPSTREAM_VERSION }}
          docker buildx imagetools inspect ${{ github.repository_owner }}/stash:lite-${{ env.UPSTREAM_VERSION }}
